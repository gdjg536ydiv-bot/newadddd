<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Local Matches | 1-on-1 Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: -apple-system, sans-serif; user-select: none; }
        
        /* Smooth Heartbeat Animation */
        .pulse-btn { animation: heartbeat 1.5s infinite; }
        @keyframes heartbeat { 0% { transform: scale(1); } 14% { transform: scale(1.05); } 28% { transform: scale(1); } 42% { transform: scale(1.05); } 70% { transform: scale(1); } }
        
        /* Live Dot Animation */
        .live-dot { border-radius: 50%; background-color: #10b981; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        /* Fake Notifications */
        .toast-notification { transform: translateY(100px); opacity: 0; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast-show { transform: translateY(0); opacity: 1; }

        /* Blur Trick */
        .premium-blur { filter: blur(8px); transition: filter 0.3s; }
        .image-card:hover .premium-blur { filter: blur(0px); }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="hide-scroll pb-24">

    <!-- Urgency Top Bar (Trick 4) -->
    <div class="bg-gradient-to-r from-pink-600 to-red-600 text-center py-2 text-xs font-bold tracking-wider sticky top-0 z-50 shadow-lg cursor-pointer" onclick="goToOffer()">
        <i class="fas fa-clock"></i> FREE REGISTRATION CLOSES IN: <span id="timer" class="text-yellow-300">05:00</span>
    </div>

    <!-- Header -->
    <header class="p-4 flex justify-between items-center border-b border-slate-800 bg-slate-900/90 backdrop-blur-md sticky top-[32px] z-40 cursor-pointer" onclick="goToOffer()">
        <div class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
            LocalMeet <i class="fas fa-fire text-orange-500"></i>
        </div>
        <div class="flex items-center gap-2 text-xs text-emerald-400 font-bold bg-emerald-900/30 px-3 py-1.5 rounded-full border border-emerald-800">
            <span class="w-2 h-2 live-dot"></span> 84 Online Now
        </div>
    </header>

    <!-- Typing Indicator (Trick 7) -->
    <div class="text-center py-3 text-xs text-slate-400 italic bg-slate-900 cursor-pointer" onclick="goToOffer()">
        <i class="fas fa-comment-dots text-pink-500 animate-bounce"></i> Someone near you is typing...
    </div>

    <!-- Image Gallery Grid (Trick 1: Everywhere is a button) -->
    <main class="p-3 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 max-w-5xl mx-auto" onclick="goToOffer()">
        
        <!-- Script generated images will go here -->
        <div id="galleryGrid" class="contents"></div>

    </main>

    <!-- Sticky Bottom CTA (Trick 12) -->
    <div class="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-slate-950 via-slate-900 to-transparent z-40">
        <button onclick="goToOffer()" class="w-full max-w-md mx-auto block pulse-btn bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(236,72,153,0.5)] border border-pink-400 text-lg">
            <i class="fas fa-video"></i> START LIVE VIDEO CHAT NOW
        </button>
    </div>

    <!-- Social Proof Notification (Trick 6) -->
    <div id="toast" class="toast-notification fixed bottom-24 left-4 right-4 md:left-auto md:right-4 md:w-80 bg-slate-800 border border-slate-600 rounded-lg p-3 shadow-2xl z-50 flex items-center gap-3 cursor-pointer" onclick="goToOffer()">
        <img id="toastImg" src="" class="w-10 h-10 rounded-full object-cover border-2 border-emerald-500">
        <div>
            <p id="toastText" class="text-sm font-bold text-white"></p>
            <p class="text-xs text-emerald-400">Just now</p>
        </div>
    </div>

    <!-- Idle Incoming Call Popup (Trick 9) -->
    <div id="callPopup" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center cursor-pointer" onclick="goToOffer()">
        <div class="w-24 h-24 rounded-full border-4 border-emerald-500 p-1 mb-4 relative pulse-btn">
            <img src="https://github.com/mizan000321-ops/newv/blob/main/HBuOij0WoAAfrI3.jpg?raw=true" class="w-full h-full rounded-full object-cover">
            <div class="absolute inset-0 rounded-full border-4 border-emerald-500 animate-ping"></div>
        </div>
        <h2 class="text-2xl font-bold text-white mb-1">Emma, 22</h2>
        <p class="text-emerald-400 mb-8 tracking-widest uppercase text-sm animate-pulse">Incoming Video Call...</p>
        
        <div class="flex gap-8">
            <div class="w-16 h-16 bg-red-500 rounded-full flex items-center justify-center text-2xl shadow-[0_0_15px_rgba(239,68,68,0.5)]">
                <i class="fas fa-phone-slash"></i>
            </div>
            <div class="w-16 h-16 bg-emerald-500 rounded-full flex items-center justify-center text-2xl shadow-[0_0_15px_rgba(16,185,129,0.5)] pulse-btn">
                <i class="fas fa-phone"></i>
            </div>
        </div>
    </div>

    <script>
        // SMARTLINK HERE
        const OFFER_LINK = "https://your-cpa-smartlink.com";

        // Apnar deya 11 ti chobi
        const images = [
            "https://github.com/mizan000321-ops/newv/blob/main/G3UZgO_XMAAzE6N.jpg?raw=true",
            "https://github.com/mizan000321-ops/newv/blob/main/GoWoZl9X0AA1I6V.jpg?raw=true",
            "https://github.com/mizan000321-ops/newv/blob/main/Gv2LKn_XwAAsWou.jpg?raw=true",
            "https://github.com/mizan000321-ops/newv/blob/main/HAwdaxsW0AA1AU1.jpg?raw=true",
            "https://github.com/mizan000321-ops/newv/blob/main/HBuOij0WoAAfrI3.jpg?raw=true",
            "https://github.com/mizan000321-ops/newv/blob/main/HE7LupIXEAA2xnS.jpg?raw=true",
            "https://github.com/mizan000321-ops/newv/blob/main/HG2xUfkX0AAZEu5.jpg?raw=true",
            "https://github.com/mizan000321-ops/newv/blob/main/HGTqY9UX0AAUZlR.jpg?raw=true",
            "https://github.com/mizan000321-ops/newv/blob/main/HGwpfY6XwAAYJZl.jpg?raw=true",
            "https://github.com/mizan000321-ops/newv/blob/main/HHN_VvQXsAAyPas.jpg?raw=true",
            "https://github.com/mizan000321-ops/newv/blob/main/HIdka0EWIAAYMTj.jpg?raw=true"
        ];

        const names = ["Jessica", "Ashley", "Sarah", "Emily", "Chloe", "Amanda", "Megan", "Rachel", "Lauren", "Samantha", "Nicole"];

        const galleryGrid = document.getElementById('galleryGrid');

        // Render Gallery (Trick 5: Shesher 3ta blur thakbe)
        images.forEach((src, index) => {
            const isBlurred = index >= 8; // Shesher 3ta blur
            const distance = Math.floor(Math.random() * 5) + 1;
            
            const cardHtml = `
                <div class="image-card relative rounded-xl overflow-hidden shadow-lg border border-slate-700 aspect-[4/5] bg-slate-800">
                    <img src="${src}" class="w-full h-full object-cover ${isBlurred ? 'premium-blur' : ''}">
                    
                    ${isBlurred ? `
                        <div class="absolute inset-0 flex flex-col items-center justify-center bg-black/40">
                            <i class="fas fa-lock text-3xl text-pink-500 mb-2 drop-shadow-md"></i>
                            <span class="bg-pink-600 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase">Tap to Unlock</span>
                        </div>
                    ` : ''}

                    <div class="absolute top-2 left-2 flex items-center gap-1.5 bg-black/50 backdrop-blur-sm px-2 py-1 rounded-full text-[10px]">
                        <span class="w-2 h-2 live-dot"></span> <span class="font-bold text-white">Live</span>
                    </div>

                    <div class="absolute bottom-0 left-0 w-full p-2 bg-gradient-to-t from-black/90 to-transparent">
                        <p class="font-bold text-sm text-white">${names[index]}, ${20 + Math.floor(Math.random() * 8)} <i class="fas fa-check-circle text-blue-400 text-[10px]"></i></p>
                        <p class="text-[10px] text-slate-300"><i class="fas fa-map-marker-alt text-pink-500"></i> ${distance} miles away</p>
                    </div>
                </div>
            `;
            galleryGrid.innerHTML += cardHtml;
        });

        // Global Click Handler
        function goToOffer() {
            window.location.href = OFFER_LINK;
        }

        // Countdown Timer Logic
        let timeLeft = 300; // 5 minutes
        setInterval(() => {
            if(timeLeft <= 0) timeLeft = 300;
            timeLeft--;
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);

        // Social Proof Popups Logic
        const toast = document.getElementById('toast');
        const toastImg = document.getElementById('toastImg');
        const toastText = document.getElementById('toastText');
        
        function showToast() {
            const randomImg = images[Math.floor(Math.random() * images.length)];
            const randomName = names[Math.floor(Math.random() * names.length)];
            const messages = ["sent you a friend request", "is looking at your profile", "wants to video chat"];
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];

            toastImg.src = randomImg;
            toastText.innerText = `${randomName} ${randomMsg}`;
            
            toast.classList.add('toast-show');
            setTimeout(() => { toast.classList.remove('toast-show'); }, 4000);
        }
        
        setInterval(showToast, 12000); // Every 12 seconds

        // Idle Timeout Call Popup
        let idleTimer = setTimeout(() => {
            document.getElementById('callPopup').classList.remove('hidden');
            document.getElementById('callPopup').classList.add('flex');
        }, 8000); // 8 seconds of inactivity

        // Reset idle timer on any interaction (before click takes them away)
        window.onload = window.onmousemove = window.onscroll = window.ontouchstart = () => {
            clearTimeout(idleTimer);
            if(document.getElementById('callPopup').classList.contains('hidden')){
                idleTimer = setTimeout(() => {
                    document.getElementById('callPopup').classList.remove('hidden');
                    document.getElementById('callPopup').classList.add('flex');
                }, 12000); 
            }
        };
    </script>
</body>
</html>
