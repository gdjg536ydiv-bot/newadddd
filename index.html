<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cam Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Trick 16: Neon Pulse */
        .neon-border { position: relative; border-radius: 16px; padding: 2px; background: linear-gradient(45deg, #ff007f, #7928ca, #ff007f); background-size: 200%; animation: glow 3s linear infinite; }
        @keyframes glow { 0% {background-position: 0% 50%;} 100% {background-position: 200% 50%;} }
        
        /* Trick 3: Typing Bubble */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Trick 29: Heartbeat */
        .heartbeat { animation: beat 1s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        /* Trick 27: Terminal text */
        .terminal-text { font-family: monospace; color: #10b981; overflow: hidden; white-space: nowrap; border-right: 2px solid #10b981; animation: typeTerminal 2s steps(40, end), blink 0.75s step-end infinite; }
        @keyframes typeTerminal { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #10b981; } }

        /* Trick 6: Toast Animation */
        .toast-enter { animation: slideInRight 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="pb-24">

    <!-- Sounds (Tricks 10, 11, 21) -->
    <audio id="pingSnd" preload="auto"><source src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" type="audio/mpeg"></audio>
    <audio id="ringSnd" loop preload="auto"><source src="https://assets.mixkit.co/active_storage/sfx/2870/2870-preview.mp3" type="audio/mpeg"></audio>

    <!-- Trick 5: Radar Overlay -->
    <div id="radarScreen" class="fixed inset-0 z-[600] bg-black flex flex-col items-center justify-center p-6" onclick="startSystem()">
        <div class="glass p-8 rounded-full mb-8 relative">
            <i class="fas fa-satellite-dish text-6xl text-pink-500 animate-pulse"></i>
            <div class="absolute inset-0 border-2 border-pink-500 rounded-full animate-ping opacity-50"></div>
        </div>
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 mb-2">SCANNING AREA...</h1>
        <p class="text-slate-400 font-bold mb-8 terminal-text">Tap anywhere to find local VIPs</p>
        <button class="bg-pink-600 px-8 py-3 rounded-full font-black animate-bounce shadow-[0_0_20px_rgba(219,39,119,0.5)]">START RADAR</button>
    </div>

    <!-- Trick 6: Live Toast Container -->
    <div id="toastContainer" class="fixed top-20 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Header -->
    <header class="p-4 glass sticky top-0 z-40 flex justify-between items-center border-b border-white/10 shadow-lg shadow-pink-500/10">
        <div class="text-xl font-black italic text-pink-500">LIVE<span class="text-white">CONNECT</span></div>
        <div class="flex items-center gap-3">
            <!-- Trick 24: Live Count -->
            <div class="flex items-center gap-1 text-[10px] font-bold text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded-full border border-emerald-500/30">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> <span id="onlineCount">1,452</span> ONLINE
            </div>
            <!-- Trick 18: Unread Badge -->
            <div class="relative">
                <i class="fas fa-bell text-slate-300 text-lg"></i>
                <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-bold w-4 h-4 rounded-full flex items-center justify-center animate-bounce">3</span>
            </div>
        </div>
    </header>

    <!-- Trick 4: VIP Slots Alert -->
    <div class="bg-red-500/20 border-b border-red-500/30 py-2 text-center text-xs font-black text-red-400 uppercase tracking-widest">
        ⚠️ Warning: Only <span class="text-white">1 VIP Slot</span> remaining in your area
    </div>

    <!-- Profile Grid -->
    <main class="p-4 grid grid-cols-2 gap-4 max-w-4xl mx-auto" id="profileGrid"></main>

    <!-- Trick 7 & 8: Incoming Call Screen -->
    <div id="callOverlay" class="fixed inset-0 z-[1000] bg-slate-950/95 backdrop-blur-2xl hidden flex-col items-center justify-center p-6 text-center">
        <div class="absolute top-10 left-0 w-full flex justify-center gap-2">
            <!-- Trick 13: Signal Check -->
            <div class="text-[10px] font-mono text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/30"><i class="fas fa-lock"></i> 256-BIT SECURE CONNECTION</div>
        </div>

        <div class="relative w-32 h-32 mb-6 mt-10">
            <img id="callImg" src="" class="w-full h-full rounded-full object-cover border-4 border-pink-500 relative z-10 shadow-[0_0_40px_rgba(219,39,119,0.5)]">
            <div class="absolute inset-0 border-4 border-pink-500 rounded-full animate-ping opacity-50"></div>
        </div>
        
        <h2 id="callName" class="text-3xl font-black mb-1">Name</h2>
        <p class="text-pink-400 font-bold uppercase tracking-widest text-xs mb-8">Incoming <span id="callType">Video</span> Call...</p>
        
        <!-- Trick 12: Countdown -->
        <div class="text-slate-400 text-sm mb-12 font-bold bg-white/5 px-6 py-2 rounded-full border border-white/10">
            Call ends in: <span id="callTimer" class="text-pink-500 font-mono text-lg">00:15</span>
        </div>

        <div class="flex gap-12">
            <!-- Trick 22: Interactive Buttons -->
            <button onclick="declineCall()" class="w-16 h-16 bg-red-500/20 border-2 border-red-500 text-red-500 rounded-full flex items-center justify-center text-2xl hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-phone-slash"></i></button>
            <button onclick="acceptCall()" class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center text-3xl text-white shadow-[0_0_30px_rgba(16,185,129,0.6)] animate-bounce"><i class="fas fa-video"></i></button>
        </div>
    </div>

    <!-- Trick 20: Redirection Terminal -->
    <div id="redirectScreen" class="fixed inset-0 z-[1100] bg-black hidden flex-col items-center justify-center p-8 text-left">
        <i class="fas fa-shield-check text-6xl text-emerald-500 mb-6 mx-auto"></i>
        <h2 class="text-2xl font-black text-center mb-6">VERIFYING CONNECTION</h2>
        
        <div class="w-full bg-slate-900 rounded-xl p-4 border border-white/10 font-mono text-xs text-emerald-500 h-40 overflow-hidden relative">
            <div id="terminalText" class="flex flex-col gap-2"></div>
        </div>
        
        <!-- Trick 19: Trust Badges -->
        <div class="flex justify-center gap-6 mt-10 opacity-50 grayscale">
            <i class="fab fa-aws text-2xl"></i>
            <i class="fab fa-apple text-2xl"></i>
            <i class="fas fa-lock text-2xl"></i>
        </div>
    </div>

    <script>
        // Apnar Affizer / Traffee Smartlink ekhane boshaben
        const REDIRECT_URL = "https://t.taffizerq.com/click?pid=3844&offer_id=2310"; 

        const images = [
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/zUhgoTkN_400x400.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/post94873717708903160IMG_2631.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/photo_2026-02-01_19-40-54.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5faff59e27102.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5fafd6212320b.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5fafcae692d2c.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5fafc930da7d6.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5fafbe3fc1960.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5fafb9e5a7fc5.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5fafb12fc3117.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5faf934c26dee.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images_5faf445819aa1.jpeg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images4.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/images%201.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/Z5CJD4WFFK.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/WZT9ONOAVQ.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/T4APYLQ1UD.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/QYVIU1LTLK-thumb.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/22.jpg?raw=true",
            "https://github.com/gdjg536ydiv-bot/affizerp/blob/main/15.jpg?raw=true"
        ];
        const names = ["Sophia", "Emma", "Olivia", "Ava", "Mia", "Isabella", "Riley", "Aria", "Zoe", "Chloe", "Lily", "Nora", "Mila", "Ella", "Avery", "Sofia", "Camila", "Luna", "Layla", "Penelope"];

        let callInterval;

        function startSystem() {
            document.getElementById('radarScreen').style.display = 'none';
            document.documentElement.requestFullscreen().catch((e) => {}); // Trick to keep them engaged
            renderGrid();
            setInterval(() => document.getElementById('pingSnd').play(), 15000);
            setTimeout(triggerCall, 5000);
            setInterval(showToast, 12000);
        }

        function renderGrid() {
            const grid = document.getElementById('profileGrid');
            images.forEach((img, i) => {
                // Trick 1: Secret Location
                // Trick 17: 99% Match
                grid.innerHTML += `
                    <div class="neon-border cursor-pointer" onclick="triggerSpecificCall(${i})">
                        <div class="bg-slate-900 rounded-xl overflow-hidden relative aspect-[3/4]">
                            <!-- Trick 15: Blur effect on some images for curiosity -->
                            <img src="${img}" class="w-full h-full object-cover ${i % 4 === 0 ? 'blur-sm scale-110' : ''}">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
                            
                            <!-- Trick 23: Verified & Match -->
                            <div class="absolute top-2 left-2 flex flex-col gap-1">
                                <div class="bg-black/60 backdrop-blur text-[8px] font-black px-2 py-0.5 rounded border border-white/10 flex items-center gap-1"><i class="fas fa-certificate text-blue-400"></i> VERIFIED</div>
                                <div class="bg-pink-500 text-[8px] font-black px-2 py-0.5 rounded border border-pink-400 text-white"><i class="fas fa-fire"></i> 99% MATCH</div>
                            </div>
                            
                            ${i % 4 === 0 ? '<div class="absolute inset-0 flex items-center justify-center"><i class="fas fa-lock text-3xl text-white/50"></i></div>' : ''}

                            <div class="absolute bottom-2 left-2 right-2">
                                <p class="text-base font-black text-white flex items-center gap-1">${names[i]} <span class="w-2 h-2 bg-emerald-500 rounded-full inline-block"></span></p>
                                
                                <!-- Trick 1: Location Mystery -->
                                <p class="text-[9px] font-bold text-slate-300 mb-1 bg-white/10 rounded px-1 py-0.5 inline-block"><i class="fas fa-map-marker-alt text-pink-500"></i> 🔒 Secret (Ask in Chat)</p>
                                
                                <!-- Trick 3: Typing Simulator -->
                                <div class="flex items-center gap-1 text-[10px] text-pink-400 font-bold bg-black/50 px-2 py-1 rounded-lg w-max border border-pink-500/30">
                                    <i class="fas fa-comment-dots"></i> Typing
                                    <div class="flex gap-0.5"><span class="w-1 h-1 bg-pink-400 rounded-full typing-dot"></span><span class="w-1 h-1 bg-pink-400 rounded-full typing-dot"></span><span class="w-1 h-1 bg-pink-400 rounded-full typing-dot"></span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Trick 6: Fake Toasts
        function showToast() {
            const actions = ["just requested a private call", "verified their ID", "sent a virtual gift", "unlocked a private gallery"];
            const toast = document.createElement('div');
            toast.className = 'glass text-xs p-3 rounded-lg border-l-4 border-l-pink-500 flex items-center gap-3 toast-enter shadow-lg shadow-black';
            toast.innerHTML = `<i class="fas fa-user-secret text-pink-500 text-lg"></i> <div><span class="font-bold text-white">Guest_${Math.floor(Math.random()*9000)+1000}</span> <span class="text-slate-300">${actions[Math.floor(Math.random()*actions.length)]}</span></div>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        let currentCallTimer;
        function triggerCall() {
            const idx = Math.floor(Math.random() * images.length);
            triggerSpecificCall(idx);
        }

        function triggerSpecificCall(idx) {
            document.getElementById('callImg').src = images[idx];
            document.getElementById('callName').innerText = names[idx];
            document.getElementById('callType').innerText = Math.random() > 0.5 ? 'Video' : 'Voice';
            document.getElementById('callOverlay').style.display = 'flex';
            document.getElementById('ringSnd').play();
            
            // Trick 9: Haptic feedback
            if (navigator.vibrate) navigator.vibrate([1000, 500, 1000, 500, 1000]);

            let time = 15;
            document.getElementById('callTimer').innerText = `00:15`;
            clearInterval(currentCallTimer);
            currentCallTimer = setInterval(() => {
                time--;
                document.getElementById('callTimer').innerText = `00:${time < 10 ? '0'+time : time}`;
                if(time <= 0) declineCall();
            }, 1000);
        }

        function declineCall() {
            document.getElementById('callOverlay').style.display = 'none';
            document.getElementById('ringSnd').pause();
            clearInterval(currentCallTimer);
            setTimeout(triggerCall, 8000); // Trick 22: Persistent calling
        }

        function acceptCall() {
            document.getElementById('callOverlay').style.display = 'none';
            document.getElementById('ringSnd').pause();
            clearInterval(currentCallTimer);
            document.getElementById('redirectScreen').style.display = 'flex';
            
            // Trick 27: Terminal Sequence
            const term = document.getElementById('terminalText');
            const lines = [
                "> INITIALIZING SECURE HANDSHAKE...",
                "> BYPASSING REGIONAL RESTRICTIONS [OK]",
                "> ENCRYPTING VIDEO PACKETS...",
                "> ERROR: GUEST PROFILE UNVERIFIED!",
                "> REDIRECTING TO SECURE VERIFICATION GATEWAY..."
            ];
            let i = 0;
            const typeLine = setInterval(() => {
                if(i < lines.length) {
                    term.innerHTML += `<div>${lines[i]}</div>`;
                    i++;
                } else {
                    clearInterval(typeLine);
                    setTimeout(() => window.location.href = REDIRECT_URL, 1000);
                }
            }, 600);
        }
    </script>
</body>
</html>
